<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aquanetix | Acceso a la Plataforma</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="assets/aquanetix.css" />
</head>
<body>

    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-brand">
                <h1 class="login-brand-logo">Aquanetix</h1>
                <p class="login-brand-subtitle">Plataforma de Inteligencia e Infraestructura Hídrica</p>
            </div>

            <form action="https://aquanetix-deploy.web.app/" method="GET">
                
                <div class="login-form-group">
                    <label class="login-form-label">Tipo de Organización / Segmento</label>
                    <div class="login-segments-grid">
                        
                        <label class="login-segment-option">
                            <input type="radio" name="segmento" value="eps" checked />
                            <div class="login-segment-card">
                                <span class="material-symbols-outlined">water_drop</span>
                                <span class="label-text">Empresas de Agua y Alcantarillado (EPS)</span>
                            </div>
                        </label>

                        <label class="login-segment-option">
                            <input type="radio" name="segmento" value="residuos" />
                            <div class="login-segment-card">
                                <span class="material-symbols-outlined">delete_outline</span>
                                <span class="label-text">Empresas Operadoras de Residuos Sólidos</span>
                            </div>
                        </label>

                    </div>
                </div>

                <div class="login-form-group">
                    <label class="login-form-label" for="email">Correo Electrónico Corporativo</label>
                    <input type="email" id="email" class="login-input-control" placeholder="ejemplo@organizacion.pe" required />
                </div>

                <div class="login-form-group">
                    <label class="login-form-label" for="password">Contraseña</label>
                    <input type="password" id="password" class="login-input-control" placeholder="••••••••" required />
                </div>

                <button type="submit" class="btn btn-large" style="width: 100%; margin-top: 10px;">
                    Ingresar al Dashboard
                </button>
            </form>

            <div class="login-footer-text">
                ¿Su organización no está registrada? <a href="index.html#cta">Solicitar acceso</a>
            </div>
        </div>
    </div>

</body>
</html>
